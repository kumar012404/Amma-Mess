<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports History - Amma Mess</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @media (max-width: 768px) {
            header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 10px !important;
                padding: 1.2rem 1.5rem !important;
            }
            header div:last-of-type {
                font-size: 0.85rem !important;
                opacity: 0.8 !important;
                margin-left: 55px; /* aligns roughly with title */
            }
            .monthly-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 12px !important;
            }
            .month-stat {
                padding: 15px !important;
            }
            .month-value {
                font-size: 1.4rem !important;
            }
            main.container {
                padding: 0 10px !important;
            }
            .card {
                padding: 20px 15px !important;
            }
            #detailed-history-container {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body style="background: #f8fafc; color: var(--primary); min-height: 100vh; padding-bottom: 50px;">

    <header style="margin-bottom: 2rem; background: linear-gradient(135deg, var(--primary), #1a252f); color: white; padding: 1.2rem 2rem; border-radius: 0 0 24px 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" style="background: rgba(255,255,255,0.15); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.1rem; transition: background 0.3s;" title="Back to Billing">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 style="font-size: 1.5rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-file-invoice" style="color: var(--accent);"></i> Sales Reports History
            </h1>
        </div>
        <div id="current-date-display" style="font-size: 0.95rem; font-weight: 600; opacity: 0.9;"></div>
    </header>

    <main class="container">
        <!-- Reports Controls Card -->
        <div class="card" style="padding: 30px; border-radius: 24px; background: white; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 2rem;">
            
            <div style="display: flex; gap: 12px; margin-bottom: 25px; max-width: 500px; margin-left: auto; margin-right: auto;">
                <button id="btn-daily-report" class="session-btn active" style="flex:1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer;" onclick="window.switchReportMode('daily')">Daily</button>
                <button id="btn-weekly-report" class="session-btn" style="flex:1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer;" onclick="window.switchReportMode('weekly')">Weekly</button>
                <button id="btn-monthly-report" class="session-btn" style="flex:1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer;" onclick="window.switchReportMode('monthly')">Monthly</button>
            </div>

            <!-- Date Selectors -->
            <div class="month-picker-container" id="daily-picker-container" style="max-width: 500px; margin: 0 auto 20px auto; display: flex; gap: 10px;">
                <input type="date" id="history-date-picker" class="month-input" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd;">
                <button class="save-item-btn" style="padding: 12px 20px; margin: 0; font-size: 1rem; border-radius: 12px;" onclick="window.fetchHistoryStats()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <div class="month-picker-container" id="weekly-picker-container" style="max-width: 500px; margin: 0 auto 20px auto; display: none; gap: 10px;">
                <input type="date" id="history-week-picker" class="month-input" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd;" title="Choose starting date of the week">
                <button class="save-item-btn" style="padding: 12px 20px; margin: 0; font-size: 1rem; border-radius: 12px;" onclick="window.fetchHistoryStats()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <div class="month-picker-container" id="monthly-picker-container" style="max-width: 500px; margin: 0 auto 20px auto; display: none; gap: 10px;">
                <input type="month" id="history-month-picker" class="month-input" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd;">
                <button class="save-item-btn" style="padding: 12px 20px; margin: 0; font-size: 1rem; border-radius: 12px;" onclick="window.fetchHistoryStats()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>

            <div id="month-loader" style="display:none; text-align:center; padding: 40px;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 2.5rem; color: var(--accent);"></i>
                <p style="margin-top: 15px; font-size: 1rem; color: var(--text-muted);">Fetching Data...</p>
            </div>

            <div id="month-no-data" style="display:none; text-align:center; padding: 30px; color: #888; font-size: 1.1rem;">
                <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 10px; color: #ccc;"></i>
                <p>No sales records found for the selected timeframe.</p>
            </div>

            <!-- Stats Dashboard Results -->
            <div id="monthly-results" style="display: none; margin-top: 20px;">
                <div class="monthly-grid" style="grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px;">
                    <div class="month-stat" style="background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #edf2f7; text-align: center;">
                        <div class="month-label" style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">Total Revenue</div>
                        <div class="month-value" id="m-revenue" style="font-size: 2rem; font-weight: 800; color: var(--primary);">₹0</div>
                    </div>
                    <div class="month-stat" style="background: #f0fdf4; padding: 25px; border-radius: 20px; border: 1px solid #dcfce7; text-align: center;">
                        <div class="month-label" style="font-size: 0.85rem; font-weight: 700; color: #166534; text-transform: uppercase; margin-bottom: 8px;">Cash Sales</div>
                        <div class="month-value" id="m-cash" style="font-size: 2rem; font-weight: 800; color: #15803d;">₹0</div>
                    </div>
                    <div class="month-stat" style="background: #f0f9ff; padding: 25px; border-radius: 20px; border: 1px solid #e0f2fe; text-align: center;">
                        <div class="month-label" style="font-size: 0.85rem; font-weight: 700; color: #075985; text-transform: uppercase; margin-bottom: 8px;">Online Sales</div>
                        <div class="month-value" id="m-online" style="font-size: 2rem; font-weight: 800; color: #0369a1;">₹0</div>
                    </div>
                    <div class="month-stat" style="background: #fff7ed; padding: 25px; border-radius: 20px; border: 1px solid #ffedd5; text-align: center;">
                        <div class="month-label" style="font-size: 0.85rem; font-weight: 700; color: #9a3412; text-transform: uppercase; margin-bottom: 8px;">Total Items Sold</div>
                        <div class="month-value" id="m-count" style="font-size: 2rem; font-weight: 800; color: #c2410c;">0</div>
                    </div>
                </div>

                <div id="monthly-results-download" style="max-width: 300px; margin: 0 auto 30px auto;">
                    <button class="save-item-btn" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; background: var(--accent); color: white; padding: 15px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(230, 126, 34, 0.2);" onclick="window.downloadCustomReportPDF()">
                        <i class="fas fa-file-pdf" style="font-size: 1.3rem;"></i> Download PDF Report
                    </button>
                </div>

                <!-- Detailed List of Bills -->
                <h3 style="font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #edf2f7; padding-bottom: 8px;">
                    <i class="fas fa-list-ul" style="color: var(--accent); margin-right: 8px;"></i> Detailed Sales Logs
                </h3>
                
                <div id="detailed-history-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;">
                    <!-- Detailed Bills Injected Here -->
                </div>
            </div>

        </div>
    </main>

    <div id="toast">Report generated!</div>

    <!-- Scripts Module -->
    <script type="module" src="reports_page.js"></script>
</body>
</html>
